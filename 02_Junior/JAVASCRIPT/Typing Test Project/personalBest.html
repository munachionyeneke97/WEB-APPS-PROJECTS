<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typing Test App | Personal Best</title>
    <link rel="icon" href="favicon-32x32.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="personalBest.css" />
  </head>
  <body>
    <div id="whole-container">
      <nav id="navbar">
        <div class="left">
          <img src="logo-large.svg" alt="" />
        </div>
        <div class="right">
          <img src="icon-personal-best.svg" alt="" />
          <p style="color: white; font-weight: 200; font-size: 14px">
            Personal best:
          </p>
        </div>
      </nav>
      <div id="display-container">
        <img src="icon-new-pb.svg" alt="" />
        <div class="text">
          <h1>High Score Smashed!</h1>
          <p class="margin-1">
            You're getting faster. That was incredible typing.
          </p>
        </div>
        <div id="result-boxes">
          <div class="box-1">
            WPM: <span style="font-weight: bold; font-size: large"></span>
          </div>
          <div class="box-2">
            Accuracy: <span style="font-weight: bold; font-size: large"></span>
          </div>
          <div class="box-3">
            Characters:
            <span style="font-weight: bold; font-size: large"></span>
          </div>
        </div>
        <div id="button">
          <p>Beat this Score</p>
          <img src="icon-restart.svg" alt="" />
        </div>
        <img src="pattern-confetti.svg" alt="" id="confetti" />
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
